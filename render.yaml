databases:
  - name: team-drawer-db
    databaseName: team_drawer
    plan: free

services:
  - type: web
    name: team-drawer
    runtime: node
    plan: free
    rootDir: backend
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: team-drawer-db
          property: connectionString
